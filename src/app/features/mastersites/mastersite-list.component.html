<div class="page-container">
  <!-- Header Area -->
  <div class="header-section">
    <div class="title-group">
      <h1 class="page-title">Master Sites</h1>
      <p class="page-subtitle">Manage facility configurations and status.</p>
    </div>
    
    <div class="action-row">
      <mat-form-field appearance="outline" class="search-field fuji-search">
        <mat-label>Search Name...</mat-label>
        <input matInput (input)="onSearch($event)" placeholder="e.g. Apollo">
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>

      <button mat-raised-button class="btn-fuji-add" (click)="onAdd()">
        <mat-icon>add</mat-icon> ADD SITE
      </button>
    </div>
  </div>

  <!-- Table Card -->
  <mat-card class="table-card">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource">

        <!-- Facility Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Facility Name</th>
          <td mat-cell *matCellDef="let site" class="bold-text">{{site.name}}</td>
        </ng-container>

        <!-- Phone Column -->
        <ng-container matColumnDef="phoneNumber">
          <th mat-header-cell *matHeaderCellDef>Phone</th>
          <td mat-cell *matCellDef="let site">{{site.phoneNumber || 'N/A'}}</td>
        </ng-container>

        <!-- Address Column -->
        <ng-container matColumnDef="address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let site" class="truncate-cell" [matTooltip]="site.address">
            {{site.address}}
          </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let site">
            <span [class]="site.isActive ? 'badge-active' : 'badge-inactive'">
              {{ site.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="center-text">Actions</th>
          <td mat-cell *matCellDef="let site" class="action-cell">
            
            <!-- View Thorough Details -->
            <button mat-icon-button color="primary" matTooltip="View Thorough Details" (click)="onView(site)">
              <mat-icon>visibility</mat-icon>
            </button>
            
            <!-- Edit Site Configurations -->
            <button mat-icon-button class="edit-btn" matTooltip="Edit Site" (click)="onEdit(site)">
              <mat-icon>edit</mat-icon>
            </button>
            
            <!-- 🟢 Production Toggle Status: Dynamic configurations for explicit Activate/Deactivate commands -->
            <button mat-icon-button 
                    [color]="site.isActive ? 'warn' : 'accent'" 
                    [matTooltip]="site.isActive ? 'Deactivate Site' : 'Activate Site'" 
                    (click)="onToggleStatus(site)">
              <mat-icon>{{ site.isActive ? 'block' : 'check_circle' }}</mat-icon>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        
        <!-- No Data Template Handler -->
        <tr *matNoDataRow>
          <td colspan="5" class="no-data">No results found for your search.</td>
        </tr>
      </table>
    </div>

    <!-- Paginator Footer -->
    <mat-paginator class="fuji-paginator"
                 [length]="totalRecords"
                 [pageSize]="filter.pageSize"
                 [pageSizeOptions]="[5, 10, 25, 50]" 
                 [pageIndex]="filter.pageNumber - 1"
                 (page)="onPageChange($event)"
                 showFirstLastButtons>
    </mat-paginator>
  </mat-card>
</div>
