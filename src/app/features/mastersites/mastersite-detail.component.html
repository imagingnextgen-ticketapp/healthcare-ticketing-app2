<div class="fuji-detail-container">
  <!-- Header -->
  <div class="detail-header">
    <div class="title-group">
      <mat-icon class="site-icon">domain</mat-icon>
      <div>
        <h1>{{ site?.name }}</h1>
        <p class="subtitle">{{ site?.address }}</p>
      </div>
    </div>
    <button mat-icon-button mat-dialog-close class="close-white"><mat-icon>close</mat-icon></button>
  </div>

  <mat-dialog-content class="detail-content">
    <mat-tab-group class="fuji-tabs" mat-stretch-tabs="false">
      
      <!-- TAB 1: USER MAPPINGS -->
      <mat-tab>
        <ng-template mat-tab-label>
          <mat-icon class="tab-icon">people</mat-icon>
          <!-- 🟢 FIXED: Displays the current slice count vs total record pool count from backend -->
          <span>Team Members ({{users.length}} of {{totalUsersCount}})</span>
        </ng-template>

        <div class="tab-pane">
          <table mat-table [dataSource]="users" class="fuji-table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef> Member Name </th>
              <td mat-cell *matCellDef="let u"> <strong>{{ u.userName }}</strong> </td>
            </ng-container>
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef> Status </th>
              <td mat-cell *matCellDef="let u">
                <span class="status-dot" [class.active]="u.isActive"></span>
                {{ u.isActive ? 'Active' : 'Inactive' }}
              </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="['name', 'status']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['name', 'status'];"></tr>
          </table>
          <div *ngIf="!users.length && !isLoading" class="empty-msg">No users mapped.</div>
        </div>
      </mat-tab>

      <!-- TAB 2: PRODUCTS (HIERARCHICAL) -->
      <mat-tab>
        <ng-template mat-tab-label>
          <mat-icon class="tab-icon">inventory_2</mat-icon>
          <span>Assigned Products</span>
        </ng-template>

        <div class="tab-pane">
          <mat-accordion class="fuji-accordion">
            <mat-expansion-panel *ngFor="let p of products" (opened)="onExpandProduct(p.productId)">
              <mat-expansion-panel-header>
                <mat-panel-title>
                  <strong>{{ p.name }}</strong>
                </mat-panel-title>
              </mat-expansion-panel-header>

              <div class="nested-view">
                <div *ngIf="loadingTemplates[p.productId]" class="text-center p-3">
                  <mat-spinner diameter="30"></mat-spinner>
                </div>
                
                <table mat-table [dataSource]="productTemplates[p.productId]" 
                       *ngIf="!loadingTemplates[p.productId] && productTemplates[p.productId]?.length" 
                       class="nested-table">
                  <ng-container matColumnDef="type">
                    <th mat-header-cell *matHeaderCellDef> Mapped Issue </th>
                    <td mat-cell *matCellDef="let t"> {{t.issueType}} </td>
                  </ng-container>
                  <ng-container matColumnDef="sla">
                    <th mat-header-cell *matHeaderCellDef> TAT SLA </th>
                    <td mat-cell *matCellDef="let t"> {{t.tatHours}}h </td>
                  </ng-container>
                  <tr mat-header-row *matHeaderRowDef="['type', 'sla']"></tr>
                  <tr mat-row *matRowDef="let row; columns: ['type', 'sla'];"></tr>
                </table>
              </div>
            </mat-expansion-panel>
          </mat-accordion>
        </div>
      </mat-tab>

    </mat-tab-group>
  </mat-dialog-content>
</div>
