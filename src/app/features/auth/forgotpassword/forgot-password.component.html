<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-brand">
      <div class="brand-icon-box"><mat-icon>mail_outline</mat-icon></div>
      <h2>Forgot Password</h2>
      <p>Enter your email to receive a password reset link.</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <!-- 🟢 Shows error or success alerts correctly -->
      @if (message) {
        <div class="alert-msg" [ngClass]="isError ? 'alert-error' : 'alert-success'">
          <mat-icon>{{ isError ? 'error_outline' : 'check_circle_outline' }}</mat-icon>
          <span>{{ message }}</span>
        </div>
      }

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="field-wrapper">
          <mat-icon class="field-prefix-icon">email</mat-icon>
          <input type="email" formControlName="email" placeholder="name@company.com" class="auth-input">
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="forgotForm.invalid || isLoading">
        <span *ngIf="!isLoading">Send Reset Link</span>
        <span *ngIf="isLoading" class="loading-row">Processing...</span>
      </button>

      <div class="auth-footer">
        <a routerLink="/login" class="back-link">Back to Login</a>
      </div>
    </form>
  </div>
</div>
