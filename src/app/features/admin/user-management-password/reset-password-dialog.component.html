<div mat-dialog-title class="reset-dialog-title">
  <h2>Reset Password for {{data.username}}</h2>
  <button mat-icon-button mat-dialog-close class="close-btn" matTooltip="Close">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <p>Enter a new password for this user. This will overwrite their current password.</p>
  
  <mat-form-field appearance="outline" class="w-100">
    <mat-label>New Password</mat-label>
    <input matInput [type]="hide ? 'password' : 'text'" [(ngModel)]="newPassword">
    <button mat-icon-button matSuffix (click)="hide = !hide">
      <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <!-- Cancel simply closes the dialog with no data -->
  <button mat-button mat-dialog-close>Cancel</button>
  
  <!-- Update closes the dialog and SENDS the 'newPassword' string back -->
  <button mat-raised-button 
          color="primary" 
          [disabled]="!newPassword || newPassword.length < 6" 
          [mat-dialog-close]="newPassword">
    Update Password
  </button>
</mat-dialog-actions>
